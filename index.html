<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator" aria-label="Advanced calculator">
    <header class="calculator-header">
      <h1>Advanced Calculator</h1>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to light mode">☀️</button>
    </header>

    <input id="display" class="display" type="text" value="0" aria-label="Calculator display" readonly>

    <section class="buttons" aria-label="Calculator buttons">
      <button class="btn control" data-action="clear">C</button>
      <button class="btn control" data-action="delete">DEL</button>
      <button class="btn function" data-action="toggle-sign">±</button>
      <button class="btn operator" data-value="/">÷</button>

      <button class="btn function" data-action="square">x²</button>
      <button class="btn function" data-action="square-root">√x</button>
      <button class="btn function" data-action="reciprocal">1/x</button>
      <button class="btn operator" data-value="*">×</button>

      <button class="btn function" data-action="sin">sin</button>
      <button class="btn function" data-action="cos">cos</button>
      <button class="btn function" data-action="tan">tan</button>
      <button class="btn operator" data-value="-">−</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn operator" data-value="+">+</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn operator" data-value="%">%</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn function" data-action="power">xʸ</button>

      <button class="btn zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
      <button class="btn function" data-action="pi">π</button>
      <button class="btn equals" data-action="calculate">=</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
